version: '3.9'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: advertising-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: advertising-db-init
    depends_on:
      - sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - ./backend/Scripts:/scripts:ro
    command: >
      bash -lc '
      until /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$SA_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; do
        echo "Waiting for SQL Server...";
        sleep 2;
      done;
      echo "Running initialization script";
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$SA_PASSWORD" -d master -i /scripts/CreateTables.sql;
      echo "Initialization complete";
      '
    restart: "no"

  webapi:
    build: ./backend
    container_name: advertisingservice-api
    depends_on:
      - db-init
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AdvertisingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      Jwt__Key: "ReplaceWithASecureRandomKeyForProduction_ChangeMe"
      Jwt__Issuer: "AdvertisingService"
      Jwt__Audience: "AdvertisingClient"
      Jwt__ExpireMinutes: "60"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:80"

volumes:
  sqlserverdata:
